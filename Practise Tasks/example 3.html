<!DOCTYPE html>
<html>
<head>
    <title>Simple Card</title>
    <style>
        .card {
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            background: #f2f2f2;
            text-align: center;
        }
        img {
            width: 100%;
            border-radius: 10px;
            border-color: white;
        }
        footer{
            text-align: center;
            padding: 12px;
            background-color: rgb(11, 12, 12);
            color: rgb(160, 73, 243);

        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/250" alt="placeholder">
        <h2>Product Name</h2>
        <p>$19.99</p>
    </div><br>
    <select>
    <option>India</option>
    <option>USA</option>
    <option>Russia</option>
    <option>Australia</option>
</select>
<form>
    <h1>Contact Us</h1>

    <input type="text" placeholder="Your Name"><br><br>
    <input type="email" placeholder="Your Email"><br><br>
    <textarea placeholder="Message"></textarea><br><br>

    <button type="submit">Send</button>
</form><br>
<table border="2">
    <tr>
        <th>Name</th>
        <th>Age</th>
    </tr>
    <tr>
        <td>sanjay</td>
        <td>38</td>
    </tr>
    <tr>
        <td>ambica</td>
        <td>30</td>
    </tr>
</table><br>
<footer>
    <p>Info@Testing.in</p>
</footer>
</body>
</html>
