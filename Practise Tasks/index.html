<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/styles.css"/>
    <title>Google Search Webpage Design</title>
</head>
<body>
    <section>
        <header>
            <ul>
                <li><a href="#">Gmail</a></li>
                <li><a href="#">Images</a></li>
                <li><a href="#"><img src="images/bars.png"  alt="Menu"></a></li>
                <li><button>Sign In</button></li>
            </ul>
        </header>
        <div class="main">
            <img src="images/google.png" alt="Logo">
            <div class="searchbox">
                <input type="text" class="search">
                <div class="icons">
                    <div><img src="images/search.png" alt="Search"></div>
                    <div><img src="images/mic.png" alt="Mic"></div>
                </div>
                <div class="buttons">
                    <button>Google Search</button>
                    <button>I'm Feeling Lucky</button>
                </div>
                <ul class="languages">
                    <li>Google offered in:</li>
                    <li><a href="#">हिन्दी</a></li>
                    <li><a href="#">తెలుగు</a></li>
                    <li><a href="#">বাংলা</a></li>
                    <li><a href="#">मराठी</a></li>
                    <li><a href="#">தமிழ்</a></li>
                </ul>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="row row1">
            <p class="country">India</p>
        </div>
        <div class="row row2">
            <ul>
                <li><a href="#">Advertising</a></li>
                <li><a href="#">Business</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">How Search Works</a></li>
            </ul>
            <ul>
                <li><a href="#">Piracy</a></li>
                <li><a href="#">Terms</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
