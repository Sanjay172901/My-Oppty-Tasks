<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Arrays</h1> 
<h2>Cricket Teams</h2>

<p id="demo"></p>

<script>
const teams = ["India", "Australia", "SouthAfrica", "Srilanka", "West Indies"];

let myList = teams.toString();
document.getElementById("demo").innerHTML = myList;
</script>

</body>
</html>
