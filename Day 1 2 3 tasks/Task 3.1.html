<!DOCTYPE html>
<html>
<body>

<form action="#" method="post">
<label for="name"><b>Full Name:</b></label><br>
<input type="text" id="name" name="name" placeholder="Enter your full name" required style="width: 60%; padding: 8px; margin: 5px 0;"><br><br>
 <label for="Roll Number"><b>Roll Number:</b></label><br>
 <input type="Roll Number" id="Roll Number" name="Roll Number" placeholder="Enter your roll number" required style="width: 60%; padding: 6px; margin: 5px 0;"><br><br>

 <label for="department"><b>Department:</b></label><br>
 <select id="subject" name="subject" style="width: 60%; padding: 8px; margin: 5px 0;">
 <option value="">Select a department</option>
 <option value="support">ECE</option>
 <option value="billing">CSC</option>
 <option value="feedback">Mech</option>
 <option value="other">EEE</option>
 </select><br><br>

<label for="year of study"><b>Year of Study:</b></label><br><br>

<input type="radio" id="1<sup>st</sup>" name="priority" value="1<sup>st</sup>">
<label for="1<sup>st</sup>">1<sup>st</sup></label><br><br>
<input type="radio" id="2<sup>nd</sup>" name="priority" value="2<sup>nd</sup>">
<label for="2<sup>nd</sup>">2<sup>nd</sup></label><br><br>
<input type="radio" id="3<sup>rd</sup>" name="priority" value="3<sup>rd</sup>">
<label for="3<sup>rd</sup>">3<sup>rd</sup></label><br><br>
<input type="radio" id="4<sup>th</sup>" name="priority" value="4<sup>th</sup>">
<label for="4<sup>th</sup>">4<sup>th</sup></label><br><br>

<label for="year of study"><b>Selected Courses:</b></label><br><br>

<input type="checkbox" id="HTML" name="newsletter" value="yes">
<label for="newsletter">HTML</label><br><br>

<input type="checkbox" id="CSS" name="newsletter" value="yes">
<label for="newsletter">CSS</label><br><br>


<input type="checkbox" id="JavaScript" name="newsletter" value="yes">
<label for="newsletter">JavaScript</label><br><br>



<input type="checkbox" id="Python" name="newsletter" value="yes">
<label for="newsletter">Python</label><br><br>




<label for="email"><b>Email Address:</b></label><br>
<input type="email" id="email" name="email" placeholder="Enter your email" required style="width: 60%; padding: 8px; margin: 5px 0;"><br><br>

<label for="attachment"><b>Attachment:</b></label><br>
<input type="file" id="attachment" name="attachment" style="margin: 3px 0;"><br><br>


<button type="submit" style="background-color: darkred; color: white; padding: 10px 20px; border: soliddashed; border-radius: 2px; cursor: pointer; font-size: 16px;">Submit</button>
<button type="reset" style="background-color: darkgreen; color: white; padding: 10px 20px; border: soliddashed; border-radius: 2px; cursor: pointer; font-size: 16px; margin-left: 10px;">Reset Form</button><br><br>


 <p><a href="#top">Back to Top</a></p>




</body>
        
</html>
