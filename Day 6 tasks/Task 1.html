<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=2.0" />
    <title>My Page</title>

    <style>
        * 
{
            padding: 0;
            margin: 100;
            box-sizing: border-box;
            font-family: 'stack sans', Times, serif;

        }

        body 
{
            background: rgb(255, 255, 255);
        }

        /* HERO SECTION */
        .hero-section 
{
             background:  #133078;
            color: rgb(255, 255, 255);
            position: relative;
            padding-bottom: 150px;
        }

        /* HEADER */
        header 
{
            width: 100%;
            padding: 40px 10%;
            display: flex;            
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        nav a
 {
            margin: 0 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 800;
        }

        nav a:hover
 {
            opacity: 0.3;
        }

        .auth a
 {
            margin-left: 15px;
            text-decoration: none;
            font-size: 14px;
        }

        .login
 {
            color: #b3dcff;
        }

        .join-btn
 {
            background: #7fc6ff;
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            border: none;
        }

        .join-btn:hover
 {
            opacity: 0.4;
        }

        /* HERO CONTENT */
        .hero-content 
{
            text-align: center;
            margin-top: 120px;
            padding: 0 10%;
        }

        .welcome
 {
            color: #7fc6ff;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .hero-content h1 
{
            font-size: 48px;
            font-weight: 700;
            line-height: 1.3;
        }

        .subtitle
 {
            margin: 20px auto;
            width: 55%;
            line-height: 1.6;
            color: #d9eaff;
        }

        .buttons
 {
            margin-top: 30px;
        }

        .primary-btn,
        .secondary-btn
 {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 6px;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .primary-btn
 {
            background: #7fc6ff;
            color: white;
        }

        .primary-btn:hover 
{
            opacity: 0.4;
        }

        .secondary-btn 
{
            border: 2px solid #7fc6ff;
            color: #7fc6ff;
        }

        .secondary-btn:hover
 {
            background: #ffffff;
            border-color: white;
        }

        /* SLANTED SHAPE */
        .slanted-shape
 {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: white;
            transform: skewY(-3.2deg);
            transform-origin: bottom right;
        }
    </style>
</head>
<body>
    <div class="hero-section">
  <header>
   <div class="logo">OPPTY Tech Hub</div>
   <nav>
   <a href="#">Home</a>
   <a href="#">Product</a>
   <a href="#">Pricing</a>
   <a href="#">Contact</a>
   </nav>
   <div class="auth">
    <a href="#" class="login">Login</a>
     <a href="#" class="join-btn">JOIN US →</a>
     </div>
     </header>

    <div class="hero-content">
    <p class="welcome">Welcome</p>
    <h1>Selling on the<br>internet like a pro</h1>

    <p class="subtitle">We know how large objects will act,<br> but things on a small scale just do not act that way.</p>
    <div class="buttons">
     <a href="#" class="primary-btn">Get Quote Now</a>
     <a href="#" class="secondary-btn">Learn More</a>
     </div>
    </div>
    <div class="slanted-shape"></div>
    </div>
</body>
</html>
