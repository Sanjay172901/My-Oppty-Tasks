<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css"/>
  <title>Multiple CSS Transitions Example</title>
   </head>
<body>
  <div class="multiple-transition">
    My Name is Sanjay<br>
    My Wife's Name is Ambica<br>
    My Son's Name is Muralijay<br>
  </div>
  
  <div class="wrapper" tabindex="0">
  <p>Hover to show menu</p>
  <div class="menu-item">SANJAY</div>
  <div class="menu-item">AMBICA</div>
  <div class="menu-item">MURALI JAY</div>
  <div class="menu-item">SATISH</div>
  <div class="menu-item">INDIRA</div>
</div>

  <button type="button">Hover</button>
      <div>
      <label for="color">--button-color:</label><input type="color" id="color" value="#00FF66" />
      </div>
    </article>
  </div>
</body>
</html>
